<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA 現場抽選系統 (Sheets)</title>
    <!-- 樣式與離線版相同 -->
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card-bg: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; text-align: center; }
        .box { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .draw-btn { background: var(--primary); color: white; padding: 1rem 2rem; border: none; border-radius: 1rem; font-size: 1.5rem; cursor: pointer; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        /* 沿用前述樣式... */
    </style>
</head>
<body x-data="sheetsApp()" x-init="fetchData()">
    <div id="loading" class="loading-screen">正在從 Google Sheets 獲取題目...</div>

    <div class="container" id="mainUI" style="display:none;">
        <h1>🏆 AETERNA 抽選 (雲端同步版)</h1>
        <div class="box">
            <h2 id="nextTable">準備抽選 A 桌題目</h2>
            <button class="draw-btn" onclick="app.draw()">開始抽選</button>
            <div id="resultArea" style="margin-top:2rem; font-size: 1.5rem; font-weight: bold; color: #ef4444;"></div>
        </div>
        <div id="history" style="text-align: left;"></div>
    </div>

    <script>
        // 【設定處】請將下方的 URL 替換為您的 Google Sheets CSV 發佈連結
        const SHEET_CSV_URL = "YOUR_CSV_URL_HERE"; 
        
        let pool = [];
        let history = [];
        const TABLE_LABELS = ["A", "B", "C", "D", "E"];

        async function fetchData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                // 簡單解析 CSV (假設每行是一個題目，A1~A5)
                pool = data.split('\n').map(row => row.replace(/"/g, '').trim()).filter(row => row.length > 0);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainUI').style.display = 'block';
                updateUI();
            } catch (error) {
                alert("抓取資料失敗，請檢查 URL 是否正確並已發佈到網路。");
            }
        }

        const app = {
            draw() {
                if (pool.length === 0) return;
                const idx = Math.floor(Math.random() * pool.length);
                const selected = pool.splice(idx, 1)[0];
                const table = TABLE_LABELS[history.length];
                history.push({ table, selected });
                
                document.getElementById('resultArea').innerText = `🎉 ${table} 桌：${selected}`;
                updateUI();
            }
        };

        function updateUI() {
            document.getElementById('nextTable').innerText = history.length < TABLE_LABELS.length 
                ? `準備抽選 ${TABLE_LABELS[history.length]} 桌題目` 
                : "全部抽取完畢";
            document.getElementById('history').innerHTML = history.map(h => `<div><b>${h.table} 桌</b>: ${h.selected}</div>`).join('');
        }
    </script>
</body>
</html>
